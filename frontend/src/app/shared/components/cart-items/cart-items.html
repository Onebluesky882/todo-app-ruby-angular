<div>
  <div
    class="max-w-xl mx-auto items-center bg-[#fffff3] border rounded-2xl shadow-md border-yellow-100 px-4 py-2 m-2 p-4 flex flex-col md:flex-row gap-4"
  >
    <!-- image -->
    <div
      class="w-full bg-white justify-center border-rose-50 md:w-32 h-32 border shadow rounded-xl overflow-hidden shrink-0"
    >
      <img [src]="product.image" [alt]="product.name" class="w-full h-full object-contain" />
    </div>

    <!-- content -->
    <div class="flex-1 flex flex-col justify-between">
      <div>
        <div class="flex items-start justify-between gap-4">
          <div>
            <p class="text-xs text-primary font-semibold uppercase">
              {{ product.subCategory }}
            </p>

            <h2 class="font-bold text-gray-800 text-lg mt-1">
              {{ product.name }}
            </h2>
          </div>

          <!-- remove -->
          <svg
            (click)="removeCartItem()"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-trash2-icon lucide-trash-2 cursor-pointer text-red-400"
          >
            <path d="M10 11v6" />
            <path d="M14 11v6" />
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
            <path d="M3 6h18" />
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
          </svg>
        </div>

        <p class="text-sm text-gray-500 mt-2 line-clamp-2">
          {{ product.description }}
        </p>
      </div>

      <!-- footer -->
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mt-4">
        <!-- qty -->
        <div class="flex items-center gap-3">
          <svg
            (click)="updateQuantity(item.qty - 1)"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-circle-minus-icon lucide-circle-minus text-gray-500 hover:text-blue-700"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M8 12h8" />
          </svg>

          <span class="font-bold text-lg">
            {{ item.qty }}
          </span>

          <svg
            (click)="updateQuantity(item.qty + 1)"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-circle-plus-icon lucide-circle-plus text-gray-500 hover:text-blue-700"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M8 12h8" />
            <path d="M12 8v8" />
          </svg>
        </div>

        <!-- price -->
        <div class="text-right">
          <p class="text-xs text-gray-500">ราคารวม</p>

          <p class="text-xl text-gray-800">
            {{ formatPrice(totalPrice) }}
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
